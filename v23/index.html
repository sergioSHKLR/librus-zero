<!DOCTYPE html>
<html lang="en">

 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>librus v.23 Production Framework</title>
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/panels.css">
  <link rel="stylesheet" href="styles/reader.css">
 </head>

 <body data-theme="light" data-density="normal" data-justify="false">
  <!-- SECTION XX -->
  <div id="orientation-shield" role="alert" aria-live="assertive">
   <div class="device-silhouette"></div>
   <p class="shield-title">Landscape Mode Required</p>
   <p class="shield-sub">Rotate your device horizontally to view the workspace layout correctly.</p>
  </div>
  <!-- SECTION XX -->
  <header class="top-bar" id="top-bar">
   <button id="toc-open" title="Table of Contents"><img src="../icons/toc.svg" alt="TOC"></button>
   <button id="library-open" title="Library Shell"><img src="../icons/library_books.svg" alt="Library"></button>
   <div class="brand">librus v23</div>
   <button id="" title="" onclick="window.location.href='https://github.com/sergioSHKLR/librus-zero'"><img
     src="../icons/deployed_code.svg" alt=""></button>
   <div class="divider"></div>
   <button id="theme-toggle" title="Toggle Theme Matrix"><img src="../icons/dark_mode.svg" alt="Theme"></button>
   <button id="settings-open" title=""><img src="../icons/settings.svg" alt=""></button>

  </header>
  <!-- SECTION XX -->
  <div class="main-workspace">
   <div id="sidebar-backdrop"></div>
   <!-- SECTION XX -->
   <main class="main-panel" role="main" id="main-panel">
    <!-- SECTION XX -->
    <div class="panel-header" id="main-panel-header">
     <div class="input-with-clear">
      <input type="text" id="panel-filter" placeholder="Search text body..." autocomplete="off">
     </div>
     <div id="search-count" class="search-count">0 / 0</div>
     <button id="btn-search-prev" title="Previous Occurrence"><img src="../icons/keyboard_arrow_up.svg"
       alt="Up"></button>
     <button id="btn-search-next" title="Next Occurrence"><img src="../icons/keyboard_arrow_down.svg"
       alt="Down"></button>
     <div class="divider"></div>
     <div class="typo-menu-wrapper" style="position: relative; display: inline-block;">
      <button class="icon-btn" id="btn-typo-toggle" title="Typography Options"
       style="font-weight: bold; font-size: 0.95rem;">Aa</button>
      <div class="typo-dropdown-menu" id="typo-dropdown-container">
       <button class="icon-btn" id="btn-font-family" title="Cycle Font Matrix"><img src="../icons/slab_serif.svg"
         alt="Font"></button>
       <button class="icon-btn" id="btn-font-inc" title="Increase Size"><img src="../icons/text_increase.svg"
         alt="+"></button>
       <button class="icon-btn" id="btn-font-dec" title="Decrease Size"><img src="../icons/text_decrease.svg"
         alt="-"></button>
       <button class="icon-btn" id="btn-density" title="Toggle Density"><img src="../icons/format_line_spacing.svg"
         alt="Density"></button>
       <button class="icon-btn" id="btn-justify" title="Toggle Justification"><img
         src="../icons/format_align_justify.svg" alt="Justify"></button>
      </div>
     </div>
    </div>
    <!-- SECTION XX -->
    <div class="panel-body" id="content-area">
     <article></article>
    </div>
   </main>
   <!-- SECTION XX -->
   <aside id="context-panel" class="research-drawer" role="complementary" aria-label="Reference Panel">
    <!-- SECTION XX -->
    <div class="panel-header" id="ctx-panel-header">
     <button id="ctx-encyclopaedia" title="Encyclopedia"><img src="../icons/globe.svg" alt="Global"></button>
     <button id="ctx-dictionary" title="Dictionary"><img src="../icons/dictionary.svg" alt="Lexicon"></button>
     <div class="divider"></div>
     <button id="ctx-toggle" title="Antidistraction Shade"><img src="../icons/visibility_off.svg" alt="Shade"></button>
     <button id="ctx-expand" title="Maximize Viewport"><img src="../icons/expand_content.svg" alt="Expand"></button>
     <button id="ctx-share" title="Share Article"><img src="../icons/share.svg" alt="Expand"></button>

    </div>
    <div class="research-frame-container" style="position: relative; flex: 1; width: 100%; height: 100%;">
     <div id="iframe-loader" class="iframe-loading-overlay">
      <div class="loading-spinner-ring"></div>
     </div>
     <div id="ctx-blur-shade" class="ctx-blur-shade">
      <p class="shade-message">Focus Shading Shield Active</p>
     </div>
     <!-- SECTION XX -->
     <iframe id="context" src="./pdf-viewer.html?file=./pdf/lde.pdf" title="Reference Area"></iframe>
    </div>
   </aside>
   <!-- SECTION XX -->
   <aside id="toc-sidebar" class="overlay-sidebar" aria-label="Table of Contents Drawer">
    <div class="panel-header">
     <h3>Table of Contents</h3>
    </div>
    <div class="sidebar-nav">
     <input type="text" id="toc-filter" placeholder="Filter sections...">
     <div id="toc-links-container"></div>
    </div>
   </aside>
   <aside id="library-sidebar" class="overlay-sidebar" aria-label="Library Shelf Drawer">
    <div class="panel-header">
     <h3>Digital Shelf</h3>
    </div>
    <div class="sidebar-nav">
     <input type="text" id="library-filter" placeholder="Filter archive catalog...">
     <div class="library-grid" id="library-shelf-container">
      <div class="paperback-card" data-title="Volume I" data-source="../lde.md"><img src="../icons/cover-1.svg"
        alt="Cover 1"><span style="margin-top:6px; font-weight:600; font-size:0.8rem;">Volume I</span></div>
      <div class="paperback-card" data-title="Volume II" data-source="vol2.md"><img src="../icons/cover-2.svg"
        alt="Cover 2"><span style="margin-top:6px; font-weight:600; font-size:0.8rem;">Volume II</span></div>
     </div>
    </div>
   </aside>
   <aside id="settings-sidebar" class="overlay-sidebar" aria-label="Engine Properties Panel">
    <div class="sidebar-nav">
     <h3 style="margin-top:0;">Configuration</h3>
     <fieldset>
      <legend>Encyclopaedic Hub Provider</legend>
      <label><input type="radio" name="encyclopedia-provider" value="pt_wikipedia" checked> Wikipédia (PT)</label>
      <label><input type="radio" name="encyclopedia-provider" value="en_wikipedia"> Wikipedia (EN)</label>
     </fieldset>
     <fieldset>
      <legend>Lexicon Dictionary Provider</legend>
      <label><input type="radio" name="dictionary-provider" value="pt_wiktionary" checked> Wikcionário (PT)</label>
      <label><input type="radio" name="dictionary-provider" value="infopedia"> Portal Infopédia</label>
     </fieldset>
    </div>
   </aside>
  </div>
  <script type="module" src="js/main.js"></script>

 </body>

</html>
