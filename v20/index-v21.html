<!DOCTYPE html>
<html lang="en">

 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Librus Workspace v.21: High-performance, zero-build text processing engine.">
  <meta name="theme-color" content="#ffffff">
  <title>librus v.21</title>
  <style>
   /* =========================================================================
   IMMORTAL ARCHIVE STYLE MATRIX v21
   ========================================================================= */

   :root {
    --bg-main: #ffffff;
    --bg-panel: #f8f9fa;
    --text-primary: #212529;
    --text-muted: #6c757d;
    --border-light: #dee2e6;
    --accent-link: #0056b3;
    --control-size: 38px;
    --control-radius: 6px;
    --control-bg: #ffffff;
    --control-border: 1px solid var(--border-light);
    --icon-filter: none;

    /* IMMUTABLE UI TYPOGRAPHY BASE */
    --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;

    /* DYNAMIC READING TYPOGRAPHY LAYER */
    --font-reading: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --size-reading: 1rem;
    --lh-reading: 1.6;
    --align-reading: left;
   }

   [data-theme="dark"] {
    --bg-main: #141414;
    --bg-panel: #1e1e1e;
    --text-primary: #e2e2e2;
    --text-muted: #8c8c8c;
    --border-light: #2d2d2d;
    --control-bg: #262626;
    --control-border: 1px solid #383838;
    --accent-link: #52a5ff;
    --icon-filter: invert(0.92) brightness(1.1);
   }

   * {
    box-sizing: border-box;
   }

   body {
    margin: 0;
    padding: 0;
    font-family: var(--font-ui);
    background: var(--bg-main);
    color: var(--text-primary);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    transition: background 0.2s ease, color 0.2s ease;
   }

   .top-bar {
    display: flex;
    align-items: center;
    height: 50px;
    padding: 0 16px;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border-light);
    gap: 8px;
    z-index: 100;
    font-family: var(--font-ui);
   }

   button {
    width: var(--control-size);
    height: var(--control-size);
    border-radius: var(--control-radius);
    border: var(--control-border);
    background: var(--control-bg);
    color: var(--text-primary);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s ease;
    font-family: var(--font-ui);
   }

   button>img,
   .panel-header button>img {
    filter: var(--icon-filter);
   }

   .brand {
    margin-left: auto;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-size: 0.85rem;
    color: var(--text-muted);
    font-family: var(--font-ui);
   }

   .main-workspace {
    display: flex;
    flex: 1;
    position: relative;
    overflow: hidden;
    height: calc(100vh - 50px);
    width: 100vw;
    background: var(--bg-main);
   }

   .main-panel {
    width: 50vw;
    display: flex;
    flex-direction: column;
    height: 100%;
    border-right: 1px solid var(--border-light);
    overflow: hidden;
    will-change: transform, width;
    transition: transform 0.15s cubic-bezier(0.2, 0.8, 0.2, 1), width 0.15s cubic-bezier(0.2, 0.8, 0.2, 1);
   }

   .research-drawer {
    width: 50vw;
    height: 100%;
    display: flex;
    flex-direction: column;
    background: var(--bg-panel);
    overflow: hidden;
    will-change: width;
    transition: width 0.15s cubic-bezier(0.2, 0.8, 0.2, 1);
   }

   .main-workspace.drawer-expand .main-panel {
    width: 50vw !important;
    transform: translateX(-100%);
    border-right: none !important;
   }

   .main-workspace.drawer-expand .research-drawer {
    width: 100vw !important;
    margin-left: -50vw;
    transition: width 0.15s cubic-bezier(0.2, 0.8, 0.2, 1), margin-left 0.15s cubic-bezier(0.2, 0.8, 0.2, 1);
   }

   .overlay-sidebar {
    position: absolute;
    top: 0;
    bottom: 0;
    left: 0;
    width: 300px;
    height: 100%;
    background: var(--bg-panel);
    border-right: 1px solid var(--border-light);
    transform: translateX(-100%);
    transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 150;
    display: flex;
    flex-direction: column;
    box-shadow: 4px 0 16px rgba(0, 0, 0, 0.15);
    font-family: var(--font-ui);
   }

   #library-sidebar {
    width: min(480px, 85vw);
   }

   #settings-sidebar {
    top: 104px;
    /* Perfectly clears both the main control toolbar and the lower iframe context panel headers */
    height: calc(100vh - 104px);
    left: auto;
    right: 0;
    border-right: none;
    border-left: 1px solid var(--border-light);
    transform: translateX(100%);
    box-shadow: -4px 0 16px rgba(0, 0, 0, 0.15);
    z-index: 160;
   }

   @media (max-width: 768px) {
    #settings-sidebar {
     top: 104px;
     /* Keeps the toggle button accessible on smaller display contexts */
     height: calc(100vh - 104px);
     width: 100%;
    }
   }

   @media (min-width: 769px) {
    #sidebar-backdrop {
     pointer-events: none !important;
    }
   }

   @media (max-width: 768px) {
    .workspace-grid {
     display: flex !important;
     flex-direction: column !important;
     overflow-y: auto !important;
    }

    #content-area {
     flex: 1 1 auto !important;
     height: 60vh !important;
     overflow-y: auto !important;
    }

    #context-panel {
     flex: 0 0 auto !important;
     height: 40vh !important;
     border-left: none !important;
     border-top: 1px solid var(--border-light) !important;
    }

    .overlay-sidebar {
     width: 280px;
    }
   }

   .overlay-sidebar.active {
    transform: translateX(0) !important;
    display: flex !important;
   }

   .panel-header {
    display: flex;
    align-items: center;
    padding: 8px 16px;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border-light);
    gap: 8px;
    flex-shrink: 0;
    height: 54px;
    font-family: var(--font-ui);
   }

   .panel-body {
    flex: 1;
    padding: 32px 24px;
    overflow-y: auto;
    background: var(--bg-main);
    color: var(--text-primary);
   }

   .panel-body article {
    max-width: 680px;
    margin: 0 auto;
    line-height: var(--lh-reading) !important;
    font-size: var(--size-reading) !important;
    text-align: var(--align-reading) !important;
    font-family: var(--font-reading) !important;
   }

   .research-drawer iframe {
    width: 100%;
    height: 100%;
    border: none;
    background: transparent;
    flex: 1;
   }

   .input-with-clear {
    position: relative;
    display: flex;
    align-items: center;
    width: 200px;
    flex-shrink: 0;
   }

   .input-with-clear input {
    width: 100%;
    padding: 8px 30px 8px 12px;
    border-radius: var(--control-radius);
    border: var(--control-border);
    background: var(--control-bg);
    color: var(--text-primary);
    font-size: 0.85rem;
    font-family: var(--font-ui);
   }

   .divider {
    width: 1px;
    height: 24px;
    background: var(--border-light);
    margin: 0 4px;
    flex-shrink: 0;
   }

   .search-count {
    font-size: 0.8rem;
    color: var(--text-muted);
    min-width: 52px;
    text-align: center;
    font-family: monospace;
   }

   .search-highlight {
    background: #fff3cd;
    color: #000000;
    border-radius: 2px;
   }

   .current-search-hit {
    background: #ffc107;
    font-weight: bold;
    box-shadow: 0 0 4px #ffc107;
   }

   /* FIX: Estilo adicionado para o destaque do sumário lateral funcionar visualmente */
   .toc-active-item {
    background: var(--border-light) !important;
    font-weight: bold !important;
    border-left: 3px solid var(--accent-link) !important;
   }

   .sidebar-nav {
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    height: 100%;
    overflow-y: auto;
    font-family: var(--font-ui);
   }

   fieldset {
    border: var(--control-border);
    border-radius: var(--control-radius);
    margin-bottom: 12px;
    padding: 12px;
    background: var(--control-bg);
   }

   legend {
    font-size: 0.75rem;
    font-weight: bold;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 0 6px;
    font-family: var(--font-ui);
   }

   fieldset label {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 6px 0;
    font-size: 0.85rem;
    cursor: pointer;
    font-family: var(--font-ui);
   }

   .ctx-blur-shade {
    position: absolute;
    top: 0px;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(248, 249, 250, 0.85);
    backdrop-filter: blur(12px);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
    z-index: 10;
   }

   [data-theme="dark"] .ctx-blur-shade {
    background: rgba(20, 20, 20, 0.88);
   }

   .ctx-blur-shade.active {
    opacity: 1;
    pointer-events: auto;
   }

   .shade-message {
    font-weight: 600;
    background: var(--control-bg);
    border: var(--control-border);
    padding: 12px 20px;
    border-radius: 8px;
    color: var(--text-primary);
    font-family: var(--font-ui);
   }

   .iframe-loading-overlay {
    position: absolute;
    top: 54px;
    left: 0;
    right: 0;
    bottom: 0;
    background: var(--bg-main);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 20;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s ease;
   }

   .iframe-loading-overlay.active {
    opacity: 1;
    pointer-events: auto;
   }

   .loading-spinner-ring {
    width: 32px;
    height: 32px;
    border: 3px solid var(--border-light);
    border-top-color: var(--accent-link);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
   }

   @keyframes spin {
    0% {
     transform: rotate(0deg);
    }

    100% {
     transform: rotate(360deg);
    }
   }

   [data-density="compact"] {
    --lh-reading: 1.35;
   }

   [data-density="normal"] {
    --lh-reading: 1.65;
   }

   [data-density="loose"] {
    --lh-reading: 2.1;
   }

   [data-justify="true"] {
    --align-reading: justify;
   }

   [data-justify="false"] {
    --align-reading: left;
   }

   #toc-links-container details {
    margin-bottom: 4px;
    width: 100%;
   }

   #toc-links-container summary {
    padding: 8px 10px;
    cursor: pointer;
    border-radius: var(--control-radius);
    font-size: 0.9rem;
    font-weight: 600;
    background: var(--control-bg);
    border: var(--control-border);
    font-family: var(--font-ui);
   }

   .toc-link-item {
    display: block;
    padding: 6px 12px;
    color: var(--accent-link);
    text-decoration: none;
    font-size: 0.85rem;
    font-family: var(--font-ui);
   }

   #toc-filter,
   #panel-filter {
    height: 38px;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-family: var(--font-ui);
   }

   /* FIX: Grid da biblioteca re-estilizada para suportar as capas estáticas */
   .library-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    gap: 16px;
   }

   .paperback-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 10px;
    border: 1px solid var(--border-light);
    border-radius: var(--control-radius);
    background: var(--control-bg);
    cursor: pointer;
    transition: transform 0.2s;
   }

   .paperback-card:hover {
    transform: translateY(-2px);
   }

   .paperback-card img {
    width: 100%;
    max-width: 70px;
    height: auto;
    border-radius: 2px;
    box-shadow: 0 2px 5px rgba(0, 0, 0, 0.15);
   }

   button:disabled {
    cursor: not-allowed;
    /* Shows a 'no' sign on hover */
   }
  </style>
 </head>

 <body data-theme="light" data-density="normal" data-justify="false">

  <script>
   /* =========================================================================
      LIBRUS CORE ENGINE - UNIFIED RECONCILIATION
      ========================================================================= */

   const LibrusState = {
    theme: localStorage.getItem('archive_theme') || 'light',
    density: localStorage.getItem('archive_user_density') || 'normal',
    justify: localStorage.getItem('archive_justify') === 'true',
    fontSize: parseFloat(localStorage.getItem('archive_font_size')) || 1.0,
    serifIndex: parseInt(localStorage.getItem('archive_serif_family'), 10) || 0,
    activeSearchProvider: 'pt_wikipedia',

    serifFamilies: [
     '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif',
     'Georgia, Times, "Times New Roman", serif',
     'Palatino Linotype, "Palatino", "Book Antiqua", serif',
     'Roboto Slab, "Segoe UI", "Helvetica Neue", Arial, sans-serif'
    ],

    searchProviders: {
     pt_wikipedia: function (q) { return 'https://pt.wikipedia.org/w/index.php?search=' + q; },
     en_wikipedia: function (q) { return 'https://en.wikipedia.org/w/index.php?search=' + q; },
     pt_wiktionary: function (q) { return 'https://pt.wiktionary.org/w/index.php?search=' + q; },
     infopedia: function (q) { return 'https://www.infopedia.pt/dicionarios/lingua-portuguesa/' + q; },
     openstreetmap: function (q) { return 'https://www.openstreetmap.org/search?query=' + q; },
     sample1: function (q) { return 'https://pt.wikipedia.org/w/index.php?search=Sample1+' + q; },
     sample2: function (q) { return 'https://pt.wiktionary.org/w/index.php?search=Sample2+' + q; },
     sample3: function (q) { return 'https://www.openstreetmap.org/search?query=Sample3+' + q; },
     sample4: function (q) { return 'https://www.openstreetmap.org/search?query=Sample4+' + q; }
    },

    init() {
     this.apply('theme', this.theme);
     this.apply('density', this.density);
     this.apply('justify', String(this.justify));
     this.updateFontProperties();
    },

    set(key, value) {
     this[key] = value;
     this.apply(key, value);
    },

    apply(key, value) {
     const storageKey = (key === 'density') ? 'archive_user_density' : 'archive_' + key;
     localStorage.setItem(storageKey, value);
     document.body.setAttribute('data-' + key, value);
    },

    updateFontProperties() {
     document.body.style.setProperty('--size-reading', this.fontSize + 'rem');
     document.body.style.setProperty('--font-reading', this.serifFamilies[this.serifIndex]);
     localStorage.setItem('archive_font_size', this.fontSize);
     localStorage.setItem('archive_serif_family', this.serifIndex);
    }
   };

   document.addEventListener('DOMContentLoaded', function () {
    LibrusState.init();

    // Cache Global Único dos Elementos do DOM
    const DOM = {
     workspace: document.querySelector('.main-workspace'),
     content: document.getElementById('content-area'),
     toc: document.getElementById('toc-sidebar'),
     library: document.getElementById('library-sidebar'),
     settings: document.getElementById('settings-sidebar'),
     iframe: document.getElementById('context'),
     loader: document.getElementById('iframe-loader'),
     shade: document.getElementById('ctx-blur-shade'),
     backdrop: document.getElementById('sidebar-backdrop'),
     tocContainer: document.getElementById('toc-links-container'),
     searchCount: document.getElementById('search-count'),
     panelFilter: document.getElementById('panel-filter'),
     tocFilter: document.getElementById('toc-filter'),
     libFilter: document.getElementById('library-filter')
    };

    /* ==========================================
       1. PIPELINE DE CONTROLE DOS PAINÉIS LATERAIS (SIDEBARS)
       ========================================== */
    function closeAllSidebars() {
     [DOM.toc, DOM.library, DOM.settings].forEach(el => el && el.classList.remove('active'));
     if (DOM.backdrop) DOM.backdrop.style.display = 'none';
    }

    function openSidebar(sidebarEl) {
     closeAllSidebars();
     if (sidebarEl) {
      sidebarEl.classList.add('active');
      if (DOM.backdrop) DOM.backdrop.style.display = 'block';
     }
    }

    if (document.getElementById('toc-open')) {
     document.getElementById('toc-open').onclick = e => {
      e.stopPropagation();
      DOM.toc.classList.contains('active') ? closeAllSidebars() : openSidebar(DOM.toc);
     };
    }
    if (document.getElementById('library-open')) {
     document.getElementById('library-open').onclick = e => {
      e.stopPropagation();
      DOM.library.classList.contains('active') ? closeAllSidebars() : openSidebar(DOM.library);
     };
    }
    if (document.getElementById('settings-open')) {
     document.getElementById('settings-open').onclick = e => {
      e.stopPropagation();
      DOM.settings.classList.contains('active') ? closeAllSidebars() : openSidebar(DOM.settings);
     };
    }

    if (DOM.backdrop) {
     DOM.backdrop.onclick = e => { e.stopPropagation(); closeAllSidebars(); };
    }

    document.onclick = function (e) {
     if (!e.target.closest('.overlay-sidebar') && !e.target.closest('button')) {
      closeAllSidebars();
     }
    };

    /* ==========================================
       2. CONSTRUÇÃO DO SUMÁRIO (TOC) & HIGHLIGHT DE ROLAGEM
       ========================================== */
    function initializeActiveScrollObserver(headings) {
     if (window.ArchiveScrollObserver) window.ArchiveScrollObserver.disconnect();

     const observerOptions = { root: DOM.content, rootMargin: '0px 0px -70% 0px', threshold: 0 };

     window.ArchiveScrollObserver = new IntersectionObserver(entries => {
      let firstIntersecting = entries.find(e => e.isIntersecting);
      if (!firstIntersecting) return;

      DOM.toc.querySelectorAll('.toc-active-item').forEach(el => el.classList.remove('toc-active-item'));
      const safeSlug = CSS.escape(firstIntersecting.target.id);
      const targetNavNode = DOM.toc.querySelector(`[data-slug="${safeSlug}"], a[href="#${safeSlug}"]`);

      if (targetNavNode) {
       targetNavNode.classList.add('toc-active-item');

       const activeChain = [];
       let currentParent = targetNavNode.parentElement;
       while (currentParent && currentParent !== DOM.tocContainer) {
        if (currentParent.tagName === 'DETAILS') activeChain.push(currentParent);
        currentParent = currentParent.parentElement;
       }

       DOM.tocContainer.querySelectorAll('details').forEach(detailsNode => {
        detailsNode.open = activeChain.includes(detailsNode);
       });

       targetNavNode.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
     }, observerOptions);

     headings.forEach(heading => window.ArchiveScrollObserver.observe(heading));
    }

    function buildTableOfContents() {
     if (!DOM.tocContainer || !DOM.content) return;
     DOM.tocContainer.innerHTML = '';

     const headings = DOM.content.querySelectorAll('h1, h2, h3, h4');
     const fragment = document.createDocumentFragment();
     let activeContainers = { 1: fragment, 2: null, 3: null, 4: null };

     headings.forEach((heading, index) => {
      const slug = heading.textContent.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '') || 'sec-' + index;
      heading.id = slug;

      const level = parseInt(heading.tagName.substring(1), 10);
      const nextHeading = headings[index + 1];
      const hasChildren = nextHeading && parseInt(nextHeading.tagName.substring(1), 10) > level;

      if (hasChildren && level < 4) {
       const details = document.createElement('details');
       details.open = (level === 1);

       const summary = document.createElement('summary');
       summary.textContent = heading.textContent;
       summary.dataset.slug = slug;

       summary.onclick = function (e) {
        e.preventDefault();
        heading.scrollIntoView({ behavior: 'smooth', block: 'center' });
       };

       details.appendChild(summary);
       (activeContainers[level] || fragment).appendChild(details);
       activeContainers[level + 1] = details;
      } else {
       const link = document.createElement('a');
       link.href = '#' + slug;
       link.textContent = heading.textContent;
       link.className = 'toc-link-item';
       link.dataset.slug = slug;

       link.onclick = function (e) {
        e.preventDefault();
        heading.scrollIntoView({ behavior: 'smooth', block: 'center' });
       };

       (activeContainers[level] || fragment).appendChild(link);
      }
     });

     DOM.tocContainer.appendChild(fragment);
     initializeActiveScrollObserver(headings);
    }

    if (DOM.tocFilter) {
     DOM.tocFilter.oninput = function (e) {
      const query = e.target.value.toLowerCase().trim();

      // Target individual leaves (links) and parent header groupings (details)
      const links = DOM.tocContainer.querySelectorAll('.toc-link-item');
      const detailBlocks = DOM.tocContainer.querySelectorAll('details');

      if (!query) {
       // Reset styles when query is clear
       links.forEach(l => l.style.display = 'block');
       detailBlocks.forEach(d => { d.style.display = 'block'; d.open = false; });
       return;
      }

      // Track details blocks that contain matching links to keep them visible
      const matchingContainers = new Set();

      links.forEach(link => {
       const matches = link.textContent.toLowerCase().includes(query);
       link.style.display = matches ? 'block' : 'none';

       if (matches) {
        let parent = link.parentElement;
        while (parent && parent !== DOM.tocContainer) {
         if (parent.tagName === 'DETAILS') {
          matchingContainers.add(parent);
         }
         parent = parent.parentElement;
        }
       }
      });

      detailBlocks.forEach(details => {
       const summaryText = details.querySelector('summary').textContent.toLowerCase();
       const summaryMatches = summaryText.includes(query);

       if (summaryMatches || matchingContainers.has(details)) {
        details.style.display = 'block';
        if (query) details.open = true; // Auto-expand matches hidden inside group
       } else {
        details.style.display = 'none';
       }
      });
     };
    }

    /* ==========================================
       3. FILTRO DA BIBLIOTECA DIGITAL (PRESERVANDO AS CAPAS)
       ========================================== */
    if (DOM.libFilter) {
     DOM.libFilter.oninput = function (e) {
      const query = e.target.value.toLowerCase().trim();
      const cards = document.querySelectorAll('#library-shelf-container .paperback-card');
      cards.forEach(card => {
       const title = card.getAttribute('data-title').toLowerCase();
       card.style.display = title.includes(query) ? 'flex' : 'none';
      });
     };
    }

    // Bind de cliques nos volumes da biblioteca
    document.querySelectorAll('#library-shelf-container .paperback-card').forEach(card => {
     card.onclick = () => {
      alert('Loading dynamic resource archive: ' + card.getAttribute('data-title'));
      closeAllSidebars();
     };
    });

    /* ==========================================
       4. MOTOR DE BUSCA EM TEMPO REAL E DESTAQUES
       ========================================== */
    let searchHits = [];
    let currentSearchIndex = -1;

    function clearHighlights() {
     searchHits = [];
     currentSearchIndex = -1;
     if (DOM.searchCount) DOM.searchCount.textContent = '0 / 0';
     if (!DOM.content) return;

     const highlights = DOM.content.querySelectorAll('.search-highlight');
     highlights.forEach(h => {
      const parent = h.parentNode;
      if (parent) {
       parent.replaceChild(document.createTextNode(h.textContent), h);
       parent.normalize();
      }
     });
    }

    if (DOM.panelFilter) {
     DOM.panelFilter.oninput = function (e) {
      clearHighlights();
      const query = e.target.value.trim();
      if (!query) return;

      const pattern = new RegExp(query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
      const walker = document.createTreeWalker(DOM.content, NodeFilter.SHOW_TEXT);
      const nodes = [];
      let n;
      while (n = walker.nextNode()) nodes.push(n);

      nodes.forEach(node => {
       const text = node.nodeValue;
       if (!pattern.test(text)) return;
       pattern.lastIndex = 0;

       const frag = document.createDocumentFragment();
       let lastIndex = 0, match;

       while ((match = pattern.exec(text)) !== null) {
        frag.appendChild(document.createTextNode(text.slice(lastIndex, match.index)));
        const mark = document.createElement('mark');
        mark.className = 'search-highlight';
        mark.textContent = match[0];
        frag.appendChild(mark);
        lastIndex = pattern.lastIndex;
       }
       frag.appendChild(document.createTextNode(text.slice(lastIndex)));
       node.parentNode.replaceChild(frag, node);
      });

      searchHits = Array.from(DOM.content.querySelectorAll('.search-highlight'));
      if (searchHits.length > 0) activateSearchHit(0);
     };
    }

    function activateSearchHit(index) {
     if (!searchHits.length) return;
     searchHits.forEach((hit, idx) => hit.classList.toggle('current-search-hit', idx === index));
     currentSearchIndex = index;
     if (DOM.searchCount) DOM.searchCount.textContent = `${currentSearchIndex + 1} / ${searchHits.length}`;
     searchHits[currentSearchIndex].scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    if (document.getElementById('btn-search-prev')) {
     document.getElementById('btn-search-prev').onclick = () => {
      if (searchHits.length) activateSearchHit((currentSearchIndex - 1 + searchHits.length) % searchHits.length);
     };
    }
    if (document.getElementById('btn-search-next')) {
     document.getElementById('btn-search-next').onclick = () => {
      if (searchHits.length) activateSearchHit((currentSearchIndex + 1) % searchHits.length);
     };
    }

    /* ==========================================
       5. INJEÇÃO DO LDE.MD (RESTAURAÇÃO COMPLETA)
       ========================================== */
    (window.requestIdleCallback || (cb => setTimeout(cb, 0)))(async function () {
     try {
      const [markedMod, purifyMod] = await Promise.all([
       import('https://cdn.jsdelivr.net/npm/marked@14.1.2/lib/marked.esm.js'),
       import('https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.es.mjs')
      ]);

      const marked = markedMod.marked;
      const DOMPurify = purifyMod.default || purifyMod.DOMPurify || purifyMod;

      const response = await fetch('../lde.md');
      if (!response.ok) throw new Error('HTTP Status: ' + response.status);
      const markdownText = await response.text();

      const rawHTML = marked.parse(markdownText);
      const cleanHTML = DOMPurify.sanitize(rawHTML);

      requestAnimationFrame(() => {
       if (DOM.content) {
        DOM.content.innerHTML = `<article>${cleanHTML}</article>`;
        buildTableOfContents();
       }
      });

     } catch (err) {
      console.warn("Using local workspace fallback framework.", err.message);
      if (DOM.content) {
       DOM.content.innerHTML = `<article>
        <h1>Immortal Archive</h1>
        <p>Fallback text initialized successfully. The app-v21 logic engine layer is running without exceptions.</p>
        <h2>Sample Chapter One</h2>
        <p>This is a default section layout block to demonstrate automated indexing mechanics.</p>
        <h3>Sub-Heading Indexing</h3>
        <p>Toggling headers now dynamically builds navigation details trees in your sidebar panel.</p>
        <h2>Sample Chapter Two</h2>
        <p>Live search highlights, dark mode profile toggles, and line spacing variations are ready.</p>
       </article>`;
       buildTableOfContents();
      }
     }
    });

    /* ==========================================
       6. CONFIGURAÇÕES E AJUSTES DE TIPOGRAFIA
       ========================================== */
    document.getElementById('btn-density').onclick = () => {
     const options = ['compact', 'normal', 'loose'];
     let idx = (options.indexOf(LibrusState.density) + 1) % options.length;
     LibrusState.set('density', options[idx]);
    };

    document.getElementById('btn-justify').onclick = () => {
     LibrusState.set('justify', !LibrusState.justify);
    };

    document.getElementById('btn-font-inc').onclick = () => {
     LibrusState.fontSize = Math.min(LibrusState.fontSize + 0.05, 1.4);
     LibrusState.updateFontProperties();
    };

    document.getElementById('btn-font-dec').onclick = () => {
     LibrusState.fontSize = Math.max(LibrusState.fontSize - 0.05, 0.85);
     LibrusState.updateFontProperties();
    };

    document.getElementById('btn-font-family').onclick = () => {
     LibrusState.serifIndex = (LibrusState.serifIndex + 1) % LibrusState.serifFamilies.length;
     LibrusState.updateFontProperties();
    };

    if (document.getElementById('theme-toggle')) {
     document.getElementById('theme-toggle').onclick = () => {
      LibrusState.set('theme', LibrusState.theme === 'dark' ? 'light' : 'dark');
     };
    }

    if (document.getElementById('theme-toggle')) {
     document.getElementById('theme-toggle').onclick = () => {
      LibrusState.set('theme', LibrusState.theme === 'dark' ? 'light' : 'dark');
     };
    }

    const shareBtn = document.getElementById('btn-share');
    if (shareBtn) {
     let cachedSelection = "";
     if (DOM.content) {
      DOM.content.addEventListener('mouseup', () => {
       const str = window.getSelection().toString().trim();
       if (str) cachedSelection = str;
      });
      DOM.content.addEventListener('keyup', () => {
       const str = window.getSelection().toString().trim();
       if (str) cachedSelection = str;
      });
     }

     shareBtn.onclick = function () {
      const activeText = cachedSelection || window.getSelection().toString().trim();
      const bookTitle = DOM.content?.querySelector('h1')?.textContent || 'Librus Asset';
      const outText = activeText ? `"${activeText}"` : `Reading: ${bookTitle}`;

      const payload = {
       title: 'Librus Workspace',
       text: outText,
       url: window.location.href
      };

      if (navigator.share && navigator.canShare && navigator.canShare(payload)) {
       navigator.share(payload).catch(err => console.warn('Share aborted:', err));
      } else {
       const clipString = `${payload.text}\nShared from: ${payload.url}`;
       if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(clipString)
         .then(() => alert(`Share Fallback (Copied to Clipboard):\n\n${clipString}`))
         .catch(() => alert(`Share Fallback:\n\n${clipString}`));
       } else {
        alert(`Share Fallback:\n\n${clipString}`);
       }
      }
     };
    }

    // Funcionalidades da Gaveta de Pesquisa / Provedores
    document.querySelectorAll('input[type="radio"]').forEach(radio => {
     radio.addEventListener('change', e => {
      LibrusState.activeSearchProvider = e.target.value;
     });
    });

    const referenceTabs = ['ctx-encyclopaedia', 'ctx-dictionary', 'ctx-map'];
    referenceTabs.forEach(id => {
     const btn = document.getElementById(id);
     if (!btn) return;
     btn.addEventListener('click', e => {
      e.preventDefault();
      const selection = window.getSelection().toString().trim();
      if (!selection) {
       alert("Nenhum texto selecionado! Por favor, selecione uma palavra no texto.");
       return;
      }

      if (DOM.loader) DOM.loader.classList.add('active');
      let providerKey = LibrusState.activeSearchProvider;

      if (id === 'ctx-encyclopaedia') {
       const checkedRadio = document.querySelector('input[name="encyclopedia-provider"]:checked');
       providerKey = checkedRadio ? checkedRadio.value : 'pt_wikipedia';
      } else if (id === 'ctx-dictionary') {
       const checkedRadio = document.querySelector('input[name="dictionary-provider"]:checked');
       providerKey = checkedRadio ? checkedRadio.value : 'pt_wiktionary';
      } else if (id === 'ctx-map') {
       providerKey = 'openstreetmap';
      }

      const builder = LibrusState.searchProviders[providerKey] || LibrusState.searchProviders.pt_wikipedia;
      let encodedQuery = encodeURIComponent(selection);
      if (providerKey === 'infopedia') encodedQuery = encodedQuery.toLowerCase();
      if (DOM.iframe) DOM.iframe.src = builder(encodedQuery);
     });
    });

    if (DOM.iframe) {
     DOM.iframe.addEventListener('load', () => { if (DOM.loader) DOM.loader.classList.remove('active'); });
    }
    if (document.getElementById('ctx-toggle')) {
     document.getElementById('ctx-toggle').onclick = () => { if (DOM.shade) DOM.shade.classList.toggle('active'); };
    }
    if (document.getElementById('ctx-expand')) {
     document.getElementById('ctx-expand').onclick = () => { if (DOM.workspace) DOM.workspace.classList.toggle('drawer-expand'); };
    }
   });
  </script>
 </body>
