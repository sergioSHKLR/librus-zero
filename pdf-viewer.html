<!DOCTYPE html>
<html lang="en">

 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Viewer</title>
  <style>
   * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
   }

   body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    background: #f5f5f5;
   }

   .pdf-container {
    display: flex;
    flex-direction: column;
    height: 100vh;
   }

   .pdf-toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px;
    background: #fff;
    border-bottom: 1px solid #e0e0e0;
    flex-wrap: wrap;
   }

   .pdf-toolbar button {
    padding: 6px 12px;
    border: 1px solid #ccc;
    border-radius: 4px;
    background: #fff;
    cursor: pointer;
    font-size: 14px;
   }

   .pdf-toolbar button:hover {
    background: #f0f0f0;
   }

   .pdf-toolbar input {
    padding: 6px 8px;
    border: 1px solid #ccc;
    border-radius: 4px;
    width: 60px;
   }

   .pdf-canvas-wrapper {
    flex: 1;
    overflow: auto;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 20px;
    background: #f5f5f5;
   }

   canvas {
    max-width: 100%;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
   }

   .page-info {
    font-size: 14px;
    color: #666;
   }

   .error {
    color: #d32f2f;
    padding: 20px;
    text-align: center;
   }
  </style>
 </head>

 <body>
  <div class="pdf-container">
   <div class="pdf-toolbar">
    <button id="prev-page">← Previous</button>
    <span class="page-info">Page <input type="number" id="page-num" min="1" value="1"> / <span
      id="page-count">0</span></span>
    <button id="next-page">Next →</button>
    <div style="flex-grow: 1;"></div>
    <button id="zoom-out">−</button>
    <span style="min-width: 50px; text-align: center;"><span id="zoom-level">100</span>%</span>
    <button id="zoom-in">+</button>
    <button id="zoom-fit">Fit</button>
   </div>
   <div class="pdf-canvas-wrapper">
    <canvas id="pdf-canvas"></canvas>
   </div>
   <div id="error-msg" class="error" style="display: none;"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
   // Set up PDF.js worker
   pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

   const canvas = document.getElementById('pdf-canvas');
   const ctx = canvas.getContext('2d');
   const pageNumInput = document.getElementById('page-num');
   const pageCountSpan = document.getElementById('page-count');
   const zoomLevelSpan = document.getElementById('zoom-level');
   const errorMsg = document.getElementById('error-msg');

   let pdfDoc = null;
   let currentPage = 1;
   let zoom = 1;
   let originalScale = 1;

   // Get PDF file from URL parameter or use default
   const params = new URLSearchParams(window.location.search);
   const pdfFile = params.get('file') || './pdf/lde.pdf';

   async function loadPDF() {
    try {
     pdfDoc = await pdfjsLib.getDocument(pdfFile).promise;
     pageCountSpan.textContent = pdfDoc.numPages;
     renderPage(currentPage);
    } catch (error) {
     errorMsg.style.display = 'block';
     errorMsg.textContent = `Error loading PDF: ${error.message}`;
     console.error('PDF load error:', error);
    }
   }

   async function renderPage(pageNum) {
    if (!pdfDoc || pageNum < 1 || pageNum > pdfDoc.numPages) return;

    try {
     const page = await pdfDoc.getPage(pageNum);
     const baseScale = 1.5;
     const scale = baseScale * zoom;
     originalScale = baseScale;

     const viewport = page.getViewport({ scale });
     canvas.width = viewport.width;
     canvas.height = viewport.height;

     const renderContext = {
      canvasContext: ctx,
      viewport: viewport
     };

     await page.render(renderContext).promise;
     currentPage = pageNum;
     pageNumInput.value = pageNum;
     zoomLevelSpan.textContent = Math.round(zoom * 100);
    } catch (error) {
     console.error('Page render error:', error);
    }
   }

   document.getElementById('prev-page').onclick = () => {
    if (currentPage > 1) renderPage(currentPage - 1);
   };

   document.getElementById('next-page').onclick = () => {
    if (currentPage < pdfDoc.numPages) renderPage(currentPage + 1);
   };

   pageNumInput.onchange = (e) => {
    const page = parseInt(e.target.value);
    if (page >= 1 && page <= pdfDoc.numPages) renderPage(page);
   };

   document.getElementById('zoom-in').onclick = () => {
    zoom = Math.min(zoom + 0.2, 3);
    renderPage(currentPage);
   };

   document.getElementById('zoom-out').onclick = () => {
    zoom = Math.max(zoom - 0.2, 0.5);
    renderPage(currentPage);
   };

   document.getElementById('zoom-fit').onclick = () => {
    zoom = 1;
    renderPage(currentPage);
   };

   // Keyboard navigation
   document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' && currentPage < pdfDoc.numPages) renderPage(currentPage + 1);
    if (e.key === 'ArrowLeft' && currentPage > 1) renderPage(currentPage - 1);
   });

   loadPDF();
  </script>
 </body>

</html>
