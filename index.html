<!DOCTYPE html>
<html lang="en">

 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
   content="The Immortal Archive: A high-performance, zero-build monolithic documentation repository designed for generational survival.">
  <title>The Immortal Archive</title>
  <style>
   body {
    margin: 0;
    padding: 16px;
    height: 100vh;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: #fff;
    color: #24292e;
   }

   .p0 {
    display: flex;
    height: 40px;
    border-bottom: 1px solid #e1e4e8;
    gap: 8px;
    padding-bottom: 12px;
    align-items: center;
   }

   .main-workspace {
    display: flex;
    flex: 1;
    position: relative;
    padding-top: 12px;
    min-height: 0;
   }

   .p2,
   .p3 {
    display: flex;
    flex-direction: column;
    flex: 1;
    min-height: 0;
   }

   .p2 {
    padding-right: 16px;
   }

   .p3 {
    border-left: 1px solid #e1e4e8;
    padding-left: 16px;
   }

   .panel-header {
    display: flex;
    height: 32px;
    align-items: center;
    gap: 4px;
    border-bottom: 1px dashed #e1e4e8;
    padding-bottom: 8px;
    margin-bottom: 12px;
   }

   .panel-body {
    flex: 1;
    overflow-y: auto;
   }

   /* Retained for performance optimizations */
   .p1,
   .p5 {
    position: absolute;
    top: 0;
    height: 100%;
    background: #fff;
    transition: transform .25s cubic-bezier(0, 0, 0.2, 1);
    will-change: transform;
    content-visibility: hidden;
   }

   .p1 {
    left: -320px;
    width: 280px;
    border-right: 1px solid #e1e4e8;
    z-index: 10;
   }

   .p5 {
    left: calc(-100% - 32px);
    width: 100%;
    z-index: 20;
   }

   .p1.active,
   .p5.active {
    content-visibility: visible;
   }

   .p1.active {
    transform: translateX(320px);
    box-shadow: 5px 0 15px rgba(0, 0, 0, 0.03);
   }

   .p5.active {
    transform: translateX(calc(100% + 32px));
   }

   .sidebar-nav {
    padding-right: 20px;
   }

   .sidebar-nav h3 {
    font-size: 11px;
    text-transform: uppercase;
    color: #8c95a0;
    letter-spacing: 0.5px;
    margin: 0 0 12px;
   }

   .sidebar-nav a {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    color: #444d56;
    text-decoration: none;
    font-size: 14px;
    border-radius: 6px;
    margin-bottom: 2px;
   }

   .sidebar-nav a:hover {
    background-color: #f6f8fa;
    color: #0366d6;
   }

   .nav-btn {
    background: transparent;
    border: 1px solid #e1e4e8;
    border-radius: 6px;
    padding: 6px 12px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    color: #24292e;
    display: inline-flex;
    align-items: center;
   }

   .nav-btn:hover {
    background-color: #f6f8fa;
   }

   .icon-btn {
    background: transparent;
    border: none;
    border-radius: 4px;
    padding: 4px;
    cursor: pointer;
    color: #586069;
    display: inline-flex;
    align-items: center;
    justify-content: center;
   }

   .icon-btn:hover {
    background-color: #f6f8fa;
    color: #24292e;
   }

   @media (max-width: 767px) {
    .p3 {
     display: none;
    }
   }
  </style>
 </head>

 <body>
  <div class="p0">
   <!-- Added initial aria accessibility markers -->
   <button id="p1-open" class="nav-btn" aria-expanded="false" aria-controls="p1">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"
     stroke-linecap="round">
     <line x1="2" y1="4" x2="14" y2="4" />
     <line x1="2" y1="8" x2="14" y2="8" />
     <line x1="2" y1="12" x2="10" y2="12" />
    </svg> TOC
   </button>
   <button id="p5-open" class="nav-btn" aria-expanded="false" aria-controls="p5">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"
     stroke-linecap="round">
     <circle cx="7" cy="7" r="4" />
     <line x1="14" y1="14" x2="10" y2="10" />
    </svg> Library
   </button>
  </div>

  <div class="main-workspace">
   <div id="p1" class="p1">
    <div id="toc" class="sidebar-nav">
     <h3>Chapters</h3>
    </div>
   </div>

   <main class="p2">
    <div class="panel-header"><strong>Document Workspace</strong></div>
    <div id="content-area" class="panel-body">Loading Archive...</div>
   </main>

   <aside class="p3">
    <div class="panel-header">
     <button class="icon-btn" aria-label="Search highlighted text">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"
       stroke-linecap="round" stroke-linejoin="round">
       <path
        d="M13.5 5.5a2 2 0 1 0 0-4 2 2 0 0 0 0 4zM2.5 10a2 2 0 1 0 0-4 2 2 0 0 0 0 4zM13.5 14.5a2 2 0 1 0 0-4 2 2 0 0 0 0 4zM4.3 7.2l7.4-3.4M4.3 8.8l7.4 3.4" />
      </svg>
     </button>
    </div>
    <div class="panel-body" style="padding:0;">
     <iframe id="preview-iframe" src="about:blank"
      style="width:100%; height:100%; border:none; background:#fff;"></iframe>
    </div>
   </aside>

   <div id="p5" class="p5">
    <div class="sidebar-nav">
     <h3>Library Volumes</h3>
     <p>Static index data.</p>
    </div>
   </div>
  </div>


  <script type="module">
   const toc = document.getElementById('p1'), lib = document.getElementById('p5');
   const p1Toggle = document.getElementById('p1-open'), p5Toggle = document.getElementById('p5-open');

   // Helper tracking to switch state tags for assistive screen devices
   function toggleSidebar(el, btn, forceClose = false) {
    const opening = forceClose ? false : !el.classList.contains('active');
    el.classList.toggle('active', opening);
    btn.setAttribute('aria-expanded', opening);
   }

   p1Toggle.onclick = (e) => { e.stopPropagation(); toggleSidebar(toc, p1Toggle); };
   p5Toggle.onclick = (e) => { e.stopPropagation(); toggleSidebar(lib, p5Toggle); };

   document.onclick = (e) => {
    if (toc.classList.contains('active') && !toc.contains(e.target) && !p1Toggle.contains(e.target)) toggleSidebar(toc, p1Toggle, true);
    if (lib.classList.contains('active') && !lib.contains(e.target) && !p5Toggle.contains(e.target)) toggleSidebar(lib, p5Toggle, true);
   };

   // IMMORTAL PIPELINE SETUP
   window.addEventListener('DOMContentLoaded', () => {
    // Explicit clean fallback closure parameter for calculation queues
    (window.requestIdleCallback || ((cb) => setTimeout(cb, 0)))(async () => {
     try {
      // Unpack dependencies using clean, fully qualified ESM endpoint coordinates
      const [markedMod, purifyMod] = await Promise.all([
       import('https://cdn.jsdelivr.net/npm/marked@5.1.1/lib/marked.esm.js'),
       import('https://cdn.jsdelivr.net/npm/dompurify@2.4.0/dist/purify.es.js')
      ]);
      const { marked } = markedMod;
      const DOMPurify = (purifyMod && (purifyMod.default || purifyMod.DOMPurify || purifyMod)) || window.DOMPurify;

      const response = await fetch('./giant-book.md');
      if (!response.ok) throw new Error(`HTTP Error Status: ${response.status}`);
      const markdownText = await response.text();

      // Fix: Secure layout strings against XSS attacks before injecting them into the DOM
      const contentArea = document.getElementById('content-area');
      const rawHTML = marked.parse(markdownText);
      contentArea.innerHTML = DOMPurify.sanitize(rawHTML);

      // Map Table of Contents links out of generated slug strings
      const tocContainer = document.getElementById('toc');
      const headings = contentArea.querySelectorAll('h1, h2, h3');

      headings.forEach((heading) => {
       // Slugify: Convert text title spaces into URL-friendly semantic target hashes
       const slug = heading.textContent.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
       heading.id = slug;

       const link = document.createElement('a');
       link.href = '#' + slug;
       link.textContent = heading.textContent;
       if (heading.tagName === 'H2') link.style.paddingLeft = '12px';
       if (heading.tagName === 'H3') link.style.paddingLeft = '24px';
       link.onclick = () => { toggleSidebar(toc, p1Toggle, true); };
       tocContainer.appendChild(link);
      });

     } catch (err) {
      console.error("Initialization Error:", err);
      document.getElementById('content-area').innerHTML = `<p style="color:red">Failed to load markdown: ${err.message}</p>`;
     }
    });
   });
  </script>
 </body>

</html>
