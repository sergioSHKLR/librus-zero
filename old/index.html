<!DOCTYPE html>
<html lang="en">

 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
   content="The Immortal Archive: A high-performance, zero-build monolithic documentation repository designed for generational survival.">
  <link rel="stylesheet"
   href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  <link rel="stylesheet" href="style.css" />

  <title>reader</title>

 </head>

 <body>
  <div class="p0">
   <!-- Added initial aria accessibility markers -->
   <button id="p1-open" class="nav-btn" aria-expanded="false" aria-controls="p1">
    <span class="material-symbols-outlined">toc</span></button>
   <button id="p5-open" class="nav-btn" aria-expanded="false" aria-controls="p5"><span
     class="material-symbols-outlined">library_books</span>
   </button>
   <button>
    <span class="material-symbols-outlined">dark_mode</span></button>
  </div>

  <div class="main-workspace">
   <div id="p1" class="p1">
    <div id="toc" class="sidebar-nav">
     <h3>toc</h3>
     <input type="text" placeholder="   filtrar">
    </div>
   </div>

   <main class="p2">
    <div class="panel-header"><input type="text" placeholder="   filtrar"><button
      class="material-symbols-outlined">search</button> | <button
      class="material-symbols-outlined">text_fields</button><button
      class="material-symbols-outlined">text_increase</button><button
      class="material-symbols-outlined">text_decrease</button><button
      class="material-symbols-outlined">density_small</button><button
      class="material-symbols-outlined">format_align_justify</button>
    </div>
    <div id="content-area" class="panel-body">Loading Archive...</div>
   </main>

   <aside class="p3">
    <div class="panel-header">
     <button type="button" class="material-symbols-outlined" aria-label="Open public search">public</button>
     <button type="button" class="material-symbols-outlined" aria-label="Open dictionary search">dictionary</button>
     <button type="button" class="material-symbols-outlined" aria-label="Open map search">map</button>
     |
     <button type="button" class="material-symbols-outlined" aria-label="Hide reference panel">visibility_off</button>
     <button id="p3-fullscreen" type="button" class="material-symbols-outlined"
      aria-label="Toggle fullscreen">fullscreen</button>
     <button id="p3-share" type="button" class="material-symbols-outlined"
      aria-label="Share the current reference URL">share</button>
    </div>
    <div class="panel-body" style="padding:0;">
     <iframe id="context" src="https://pt.wikipedia.org"></iframe>
    </div>
   </aside>

   <div id="p5" class="p5">
    <div class="sidebar-nav">
     <h3>Library</h3>
     <input type="text" placeholder="   filtrar">
    </div>
   </div>
  </div>

  <script type="module" src="script.js"></script>
  <script type="application/json" class="js-hypothesis-config">
  {
    "openSidebar": true
  }
</script>
  <script async src="https://hypothes.is/embed.js" defer></script>
 </body>

</html>
